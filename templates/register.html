{% extends "base.html" %}
{% block title %}Register — Draft Together{% endblock %}

{% block content %}
<div class="container">
  <h1>Create account</h1>
  <form id="register-form">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password">
    </div>
    <button type="submit">Register</button>
    <p class="error" id="error"></p>
  </form>
  <p style="margin-top:16px;font-size:0.875rem;color:#555;">
    Already have an account? <a href="/">Login</a>
  </p>
</div>

<script>
  if (localStorage.getItem("token")) {
    window.location.href = "/rooms/";
  }

  document.getElementById("register-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const errorEl = document.getElementById("error");
    errorEl.textContent = "";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) {
      errorEl.textContent = "Both fields are required.";
      return;
    }

    try {
      const res = await fetch("/api/auth/register/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data.username?.[0] ?? data.password?.[0] ?? "Registration failed.";
        errorEl.textContent = msg;
        return;
      }

      localStorage.setItem("token", data.token);
      window.location.href = "/rooms/";
    } catch {
      errorEl.textContent = "Network error. Please try again.";
    }
  });
</script>
{% endblock %}
