{% extends "base.html" %}
{% block title %}Login — Draft Together{% endblock %}

{% block content %}
<div class="container">
  <h1>Draft Together</h1>
  <form id="login-form">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">
    </div>
    <button type="submit">Login</button>
    <p class="error" id="error"></p>
  </form>
  <p style="margin-top:16px;font-size:0.875rem;color:#555;">
    No account? <a href="/register/">Register</a>
  </p>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.href = "/rooms/";
  }

  document.getElementById("login-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const errorEl = document.getElementById("error");
    errorEl.textContent = "";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) {
      errorEl.textContent = "Both fields are required.";
      return;
    }

    try {
      const res = await fetch("/token/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.non_field_errors?.[0] ?? "Invalid credentials.";
        return;
      }

      localStorage.setItem("token", data.token);
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get("next") ?? "/rooms/";
    } catch {
      errorEl.textContent = "Network error. Please try again.";
    }
  });
</script>
{% endblock %}
