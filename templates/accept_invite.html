{% extends "base.html" %}
{% block title %}Join Room — Draft Together{% endblock %}

{% block content %}
<div class="container">
  <h1>You've been invited</h1>
  <p id="status" style="color:#555;margin-bottom:16px;">Verifying invite...</p>
  <p class="error" id="error"></p>
</div>

<script>
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "/?next={{ request.path }}";
  }

  async function acceptInvite() {
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    try {
      const res = await fetch("/api/invites/{{ token }}/accept/", {
        method: "POST",
        headers: { "Authorization": "Token " + token },
      });

      if (res.status === 401) {
        localStorage.removeItem("token");
        window.location.href = "/?next={{ request.path }}";
        return;
      }

      const data = await res.json();

      if (!res.ok) {
        statusEl.hidden = true;
        errorEl.textContent = data.detail ?? "Invalid invite.";
        return;
      }

      statusEl.textContent = "Redirecting to room...";
      window.location.href = "/rooms/" + data.room_id + "/";
    } catch {
      document.getElementById("status").hidden = true;
      errorEl.textContent = "Network error. Please try again.";
    }
  }

  acceptInvite();
</script>
{% endblock %}
