<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Draft Together{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; }
    a { color: inherit; }
    .container { max-width: 480px; margin: 80px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 24px; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
    button { padding: 8px 16px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #333; }
    .error { color: #c00; font-size: 0.875rem; margin-top: 8px; min-height: 20px; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 0.875rem; margin-bottom: 4px; color: #444; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
